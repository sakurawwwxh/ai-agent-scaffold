<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralCore · 智能体中控台</title>
    <style>
      :root {
        --amber-900: #451a03;
        --amber-800: #78350f;
        --amber-700: #92400e;
        --amber-600: #d97706;
        --amber-500: #f59e0b;
        --amber-400: #fbbf24;
        --amber-300: #fcd34d;
        --amber-200: #fde68a;
        --amber-100: #fef3c7;
        --amber-50: #fffbeb;
        --rose-600: #e11d48;
        --rose-500: #f43f5e;
        --rose-400: #fb7185;
        --rose-100: #ffe4e6;
        --stone-900: #1c1917;
        --stone-800: #292524;
        --stone-700: #44403c;
        --stone-600: #57534e;
        --stone-500: #78716c;
        --stone-400: #a8a29e;
        --stone-300: #d6d3d1;
        --stone-200: #e7e5e4;
        --stone-100: #f5f5f4;
        --white: #fafaf9;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        height: 100%;
        font-family: "Plus Jakarta Sans", "DM Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      .bg {
        position: fixed;
        inset: 0;
        background: linear-gradient(165deg, #1c1917 0%, #292524 30%, #362f2a 55%, #1c1917 100%);
        z-index: 0;
      }

      .bg-particles {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        filter: blur(40px);
        opacity: 0.18;
        animation: float 18s ease-in-out infinite;
      }

      .particle:nth-child(1) {
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(245,158,11,0.7), transparent 70%);
        top: -10%; left: -8%;
        animation-delay: 0s;
        animation-duration: 22s;
      }
      .particle:nth-child(2) {
        width: 380px; height: 380px;
        background: radial-gradient(circle, rgba(244,63,94,0.5), transparent 70%);
        bottom: -12%; right: -6%;
        animation-delay: -7s;
        animation-duration: 20s;
      }
      .particle:nth-child(3) {
        width: 300px; height: 300px;
        background: radial-gradient(circle, rgba(251,191,36,0.5), transparent 70%);
        top: 50%; left: 55%;
        animation-delay: -14s;
        animation-duration: 25s;
      }
      .particle:nth-child(4) {
        width: 220px; height: 220px;
        background: radial-gradient(circle, rgba(245,158,11,0.4), transparent 70%);
        top: 20%; right: 15%;
        animation-delay: -3s;
        animation-duration: 16s;
      }
      .particle:nth-child(5) {
        width: 180px; height: 180px;
        background: radial-gradient(circle, rgba(251,113,133,0.35), transparent 70%);
        bottom: 20%; left: 10%;
        animation-delay: -10s;
        animation-duration: 19s;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(30px, -40px) scale(1.08); }
        50% { transform: translate(-20px, 20px) scale(0.94); }
        75% { transform: translate(15px, 30px) scale(1.05); }
      }

      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 900px;
        background: rgba(41, 37, 36, 0.65);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        overflow: hidden;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(245, 158, 11, 0.08) inset;
        display: grid;
        grid-template-columns: 1fr 0.9fr;
        animation: cardIn 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
      }

      @keyframes cardIn {
        from { opacity: 0; transform: translateY(40px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      .hero-side {
        padding: 44px 36px 36px 44px;
        position: relative;
        overflow: hidden;
      }

      .hero-side::after {
        content: "";
        position: absolute;
        right: 0;
        top: 12%;
        bottom: 12%;
        width: 1px;
        background: linear-gradient(180deg, transparent, rgba(245,158,11,0.2), transparent);
      }

      .brand-line {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 32px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--amber-500), var(--amber-600));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 900;
        color: var(--amber-900);
        box-shadow: 0 8px 28px rgba(245, 158, 11, 0.35);
      }

      .brand-line h3 {
        font-size: 15px;
        font-weight: 700;
        color: var(--white);
        letter-spacing: -0.1px;
      }

      .brand-line span {
        display: block;
        font-size: 11px;
        color: var(--stone-400);
        margin-top: 2px;
        letter-spacing: 0.2px;
      }

      .hero-side h1 {
        font-size: 28px;
        font-weight: 800;
        line-height: 1.25;
        color: var(--white);
        letter-spacing: -0.4px;
        margin-bottom: 14px;
      }

      .hero-side h1 em {
        font-style: normal;
        background: linear-gradient(135deg, var(--amber-400), var(--rose-400));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero-side > p {
        font-size: 13px;
        color: var(--stone-400);
        line-height: 1.7;
        margin-bottom: 28px;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 28px;
      }

      .pill {
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        color: var(--stone-300);
        transition: all 0.2s ease;
        cursor: default;
      }

      .pill:hover {
        background: rgba(245,158,11,0.1);
        border-color: rgba(245,158,11,0.25);
        color: var(--amber-400);
      }

      .visual-area {
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(0,0,0,0.3);
        box-shadow: 0 12px 40px rgba(0,0,0,0.35);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .visual-area:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      }

      .visual-area img {
        display: block;
        width: 100%;
        height: auto;
        min-height: 190px;
        object-fit: cover;
      }

      .login-side {
        padding: 44px 44px 36px 36px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .login-side h2 {
        font-size: 24px;
        font-weight: 800;
        color: var(--white);
        letter-spacing: -0.3px;
        margin-bottom: 4px;
      }

      .login-side .hint {
        font-size: 12px;
        color: var(--stone-500);
        margin-bottom: 24px;
        line-height: 1.5;
      }

      .field {
        margin-bottom: 16px;
      }

      .field label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: var(--stone-400);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }

      .input-box {
        position: relative;
      }

      .input-box .pre-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        color: var(--stone-500);
        pointer-events: none;
        transition: color 0.2s ease;
      }

      .input-box input {
        width: 100%;
        padding: 14px 16px 14px 46px;
        border: 1.5px solid rgba(255,255,255,0.1);
        border-radius: 14px;
        background: rgba(255,255,255,0.04);
        color: var(--white);
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      }

      .input-box input::placeholder {
        color: var(--stone-600);
      }

      .input-box input:focus {
        border-color: var(--amber-500);
        background: rgba(245,158,11,0.06);
        box-shadow: 0 0 0 5px rgba(245,158,11,0.08);
      }

      .input-box input:focus ~ .pre-icon,
      .input-box input:focus + .pre-icon {
        color: var(--amber-400);
      }

      .input-box:focus-within .pre-icon {
        color: var(--amber-400);
      }

      .btn-submit {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 700;
        color: var(--amber-900);
        background: linear-gradient(135deg, var(--amber-400), var(--amber-500));
        cursor: pointer;
        box-shadow: 0 8px 28px rgba(245,158,11,0.25);
        transition: all 0.2s ease;
        margin-top: 6px;
      }

      .btn-submit:hover {
        box-shadow: 0 12px 36px rgba(245,158,11,0.4);
        transform: translateY(-1px);
      }

      .btn-submit:active {
        transform: translateY(1px) scale(0.98);
        box-shadow: 0 4px 16px rgba(245,158,11,0.2);
      }

      .btn-demo {
        width: 100%;
        padding: 11px;
        border: 1.5px solid rgba(255,255,255,0.1);
        border-radius: 14px;
        font-size: 13px;
        font-weight: 600;
        color: var(--stone-400);
        background: transparent;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 10px;
      }

      .btn-demo:hover {
        border-color: rgba(255,255,255,0.2);
        color: var(--stone-200);
        background: rgba(255,255,255,0.04);
      }

      .msg-area {
        min-height: 20px;
        font-size: 12px;
        color: var(--stone-500);
        margin-top: 14px;
        text-align: center;
        transition: color 0.2s ease;
      }

      .msg-area.error {
        color: var(--rose-500);
        background: rgba(244,63,94,0.08);
        padding: 9px 14px;
        border-radius: 10px;
        border: 1px solid rgba(244,63,94,0.15);
      }

      .msg-area.success {
        color: var(--amber-400);
        background: rgba(245,158,11,0.08);
        padding: 9px 14px;
        border-radius: 10px;
        border: 1px solid rgba(245,158,11,0.15);
      }

      .logged-bar {
        display: none;
        align-items: center;
        gap: 14px;
        justify-content: space-between;
        padding: 14px 16px;
        border: 1px solid rgba(245,158,11,0.2);
        border-radius: 14px;
        background: rgba(245,158,11,0.06);
        margin-top: 16px;
      }

      .logged-bar .u-name {
        font-size: 14px;
        font-weight: 700;
        color: var(--amber-400);
        display: block;
      }

      .logged-bar .u-meta {
        font-size: 11px;
        color: var(--stone-500);
        margin-top: 2px;
        display: block;
      }

      .btn-logout {
        padding: 8px 18px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        color: var(--stone-400);
        background: transparent;
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
      }

      .btn-logout:hover {
        border-color: rgba(244,63,94,0.4);
        color: var(--rose-400);
        background: rgba(244,63,94,0.06);
      }

      .foot-note {
        text-align: center;
        font-size: 11px;
        color: var(--stone-600);
        margin-top: 20px;
      }

      @media (max-width: 780px) {
        .card {
          grid-template-columns: 1fr;
          max-width: 440px;
        }

        .hero-side {
          padding: 32px 28px 20px 28px;
        }

        .hero-side::after {
          display: none;
        }

        .hero-side h1 {
          font-size: 22px;
        }

        .login-side {
          padding: 20px 28px 32px 28px;
        }

        .visual-area img {
          min-height: 140px;
        }
      }
    </style>
  </head>

  <body>
    <div class="bg"></div>
    <div class="bg-particles" aria-hidden="true">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <main class="page">
      <div class="card">
        <section class="hero-side">
          <div class="brand-line">
            <div class="brand-mark">NC</div>
            <div>
              <h3>NeuralCore 中控台</h3>
              <span>多智能体协作引擎 · 企业级私有部署</span>
            </div>
          </div>

          <h1>向 AI 描述目标，<em>让它替你调度一切</em></h1>
          <p>
            把重复劳动交给智能体集群。自然语言就是你的命令行——
            只需描述意图，引擎自动拆解、编排、执行、反馈。
            演示阶段，使用预置凭证快速体验：
            账号 <b style="color:var(--amber-400)">admin</b>、密码 <b style="color:var(--amber-400)">admin</b>。
          </p>

          <div class="pill-row">
            <span class="pill">⚡ 意图驱动</span>
            <span class="pill">🔗 链式编排</span>
            <span class="pill">🔄 自主迭代</span>
            <span class="pill">� 实时监控</span>
          </div>

          <div class="visual-area">
            <img src="images/ai-hero.svg" alt="NeuralCore 调度看板示意图" />
          </div>
        </section>

        <section class="login-side">
          <h2>进入控制台</h2>
          <p class="hint">预置凭证 admin / admin · 接入 LDAP/OAuth2 后可替换为真实鉴权</p>

          <form id="loginForm" autocomplete="on">
            <div class="field">
              <label for="username">工作台账号</label>
              <div class="input-box">
                <span class="pre-icon">👤</span>
                <input id="username" name="username" type="text" placeholder="输入账号" autocomplete="username" />
              </div>
            </div>

            <div class="field">
              <label for="password">访问密钥</label>
              <div class="input-box">
                <span class="pre-icon">🔑</span>
                <input id="password" name="password" type="password" placeholder="输入密钥" autocomplete="current-password" />
              </div>
            </div>

            <button class="btn-submit" type="submit">启动会话</button>
            <button class="btn-demo" type="button" id="fillDemo">快捷填入演示凭证</button>

            <div class="msg-area" id="msg" role="status" aria-live="polite"></div>
          </form>

          <div class="logged-bar" id="loggedBox">
            <div>
              <span class="u-name" id="loggedUser">已连接</span>
              <span class="u-meta" id="loggedMeta"></span>
            </div>
            <button class="btn-logout" type="button" id="logoutBtn">断开</button>
          </div>
        </section>
      </div>
    </main>

    <div class="foot-note">NeuralCore v1.0 · 多智能体协作引擎 · 安全私有化部署</div>

    <script>
      const COOKIE_NAME = "neuralcore_session";
      const COOKIE_DAYS = 7;

      function setCookie(name, value, days) {
        const maxAge = Math.max(0, Math.floor(days * 86400));
        document.cookie = `${name}=${encodeURIComponent(value)}; Max-Age=${maxAge}; Path=/; SameSite=Lax`;
      }

      function getCookie(name) {
        const cookies = document.cookie ? document.cookie.split("; ") : [];
        for (const item of cookies) {
          const eqIndex = item.indexOf("=");
          const k = eqIndex >= 0 ? item.slice(0, eqIndex) : item;
          const v = eqIndex >= 0 ? item.slice(eqIndex + 1) : "";
          if (k === name) return decodeURIComponent(v);
        }
        return null;
      }

      function deleteCookie(name) {
        document.cookie = `${name}=; Max-Age=0; Path=/; SameSite=Lax`;
      }

      function safeParseJson(text) {
        try { return JSON.parse(text); } catch { return null; }
      }

      function formatTime(ts) {
        const d = new Date(ts);
        const p = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
      }

      const dom = {
        form: document.getElementById("loginForm"),
        username: document.getElementById("username"),
        password: document.getElementById("password"),
        msg: document.getElementById("msg"),
        fillDemo: document.getElementById("fillDemo"),
        loggedBox: document.getElementById("loggedBox"),
        loggedUser: document.getElementById("loggedUser"),
        loggedMeta: document.getElementById("loggedMeta"),
        logoutBtn: document.getElementById("logoutBtn"),
      };

      function setMessage(text, type) {
        dom.msg.textContent = text || "";
        dom.msg.className = "msg-area";
        if (type) dom.msg.classList.add(type);
      }

      function showLoggedIn(payload) {
        dom.form.style.display = "none";
        dom.loggedBox.style.display = "flex";
        dom.loggedUser.textContent = `当前会话：${payload.user || "未知"}`;
        dom.loggedMeta.textContent = payload.ts ? `上次连接：${formatTime(payload.ts)}` : "";
      }

      function showLoginForm() {
        dom.form.style.display = "block";
        dom.loggedBox.style.display = "none";
      }

      function bootFromCookie() {
        const raw = getCookie(COOKIE_NAME);
        if (!raw) return;
        const payload = safeParseJson(raw);
        if (!payload || !payload.user) return;
        window.location.replace("./index.html");
      }

      dom.fillDemo.addEventListener("click", () => {
        dom.username.value = "admin";
        dom.password.value = "admin";
        setMessage("▸ 演示凭证已填入，点击「启动会话」即可进入。", "success");
        dom.password.focus();
      });

      dom.logoutBtn.addEventListener("click", () => {
        deleteCookie(COOKIE_NAME);
        setMessage("▸ 会话已断开，本地凭证已擦除。", "success");
        showLoginForm();
      });

      dom.form.addEventListener("submit", (e) => {
        e.preventDefault();
        setMessage("");

        const username = (dom.username.value || "").trim();
        const password = dom.password.value || "";

        if (!username || !password) {
          setMessage("请填写工作台账号与访问密钥。", "error");
          return;
        }

        if (username !== "admin" || password !== "admin") {
          setMessage("凭证校验未通过，请重试（演示：admin / admin）。", "error");
          return;
        }

        const payload = { user: username, ts: Date.now() };
        setCookie(COOKIE_NAME, JSON.stringify(payload), COOKIE_DAYS);
        setMessage("▸ 凭证验证通过，正在建立会话连接…", "success");
        window.location.replace("./index.html");
      });

      bootFromCookie();
    </script>
  </body>
</html>
